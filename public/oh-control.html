<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة الإدارة | OH</title><link rel="stylesheet" href="/styles.css"></head><body><div class="nav"><div class="brand brand-glow"><img src="/logo.svg" alt="OH"><span>OH</span></div><div class="menu"><a class="btn secondary" href="/">الرئيسية</a><a class="btn secondary" href="/dashboard.html">حسابي</a><button class="btn secondary" id="logoutBtn">خروج</button></div></div><div class="container"><div class="toolbar"><div><div class="kicker">Admin Control</div><h1 class="section-title">لوحة إدارة OH</h1></div><a class="btn secondary" href="/contact.html">تواصل سريع</a></div><div class="kpis" id="kpis" style="margin-top:18px"></div><div class="searchbar" style="margin-top:18px"><input id="searchBox" class="input" placeholder="ابحث بالاسم أو البريد أو العنوان أو المرجع"><select id="filterType" class="input" style="max-width:220px"><option value="all">الكل</option><option value="payments">الدفعات</option><option value="submissions">الطلبات</option><option value="consultations">الاستشارات</option><option value="users">المستخدمون</option></select></div><div class="admin-grid" style="margin-top:18px"><div class="card"><h2 class="section-title">النتائج</h2><div id="adminResults" class="list"></div></div><div class="card sticky"><h2 class="section-title">إعدادات سريعة</h2><div class="list"><div class="item"><strong>أسعار الباقات</strong><div class="row" style="margin-top:10px"><input id="priceP" class="input" placeholder="P"><input id="priceM" class="input" placeholder="M"><input id="priceD" class="input" placeholder="D"><input id="priceMonthly" class="input" placeholder="MONTHLY"></div><button class="btn full" style="margin-top:12px" id="savePricesBtn">حفظ الأسعار</button></div><div class="item"><strong>إرشادات</strong><div class="small">اعتماد أو رفض الدفعات من هنا، والرد على الطلبات والاستشارات وتغيير الحالة، وترقية المستخدمين إذا كنت Owner.</div></div></div></div></div></div><div class="overlay-loading" id="loadingMask"><div class="loader-card"><div class="menu"><span class="spinner lg"></span><div>جارٍ التحديث...</div></div></div></div><div class="footer">OH التعليمية • إدارة كاملة</div><script src="/app.js"></script><script>
OH.bindLogout();
let adminState={payments:[],users:[],submissions:[],consultations:[],me:null};
function rowHtml(title, type, body){return `<div class="item admin-item" data-type="${type}">${body}</div>`}
function matches(text,q){return text.toLowerCase().includes(q.toLowerCase())}
function renderResults(){const q=document.getElementById('searchBox').value.trim().toLowerCase();const t=document.getElementById('filterType').value;let html='';if((t==='all'||t==='payments')) html+=adminState.payments.filter(p=>!q||matches(`${p.user?.name||''} ${p.user?.email||''} ${p.reference||''} ${p.plan||''}`,q)).map(p=>rowHtml('دفعة','payments',`<strong>${p.user?.name||'-'} - ${p.amountJOD} د.أ</strong><div class="small">الخطة: ${p.plan} | الطريقة: ${OH.paymentMethodBadge(p.method)} | الحالة: ${OH.statusLabel(p.status)}</div><div class="small codebox">المرجع: ${p.reference}</div><div class="menu" style="margin-top:12px"><button class="btn" onclick="approvePayment('${p.id}')">اعتماد</button><button class="btn danger" onclick="rejectPayment('${p.id}')">رفض</button></div>`)).join('');if((t==='all'||t==='submissions')) html+=adminState.submissions.filter(s=>!q||matches(`${s.title||''} ${s.user?.name||''} ${s.user?.email||''} ${s.criterion||''}`,q)).map(s=>rowHtml('طلب','submissions',`<strong>${s.title}</strong><div class="small">${s.user?.name||'-'} | ${s.criterion} | ${OH.statusLabel(s.status)}</div><textarea id="subReply-${s.id}" class="full" placeholder="اكتب الرد على العميل">${s.aiReply||''}</textarea><div class="filter-row" style="margin-top:10px"><select id="subStatus-${s.id}" class="input" style="max-width:220px"><option value="pending" ${s.status==='pending'?'selected':''}>قيد المراجعة</option><option value="working" ${s.status==='working'?'selected':''}>قيد التنفيذ</option><option value="done" ${s.status==='done'?'selected':''}>مكتمل</option><option value="rejected" ${s.status==='rejected'?'selected':''}>مرفوض</option></select><button class="btn" onclick="saveSubmission('${s.id}')">إرسال الرد للعميل</button>${s.fileName?`<a class="btn secondary" target="_blank" href="/api/submissions/${s.id}/file">تحميل الملف</a>`:''}</div>`)).join('');if((t==='all'||t==='consultations')) html+=adminState.consultations.filter(c=>!q||matches(`${c.title||''} ${c.user?.name||''} ${c.user?.email||''} ${c.message||''}`,q)).map(c=>rowHtml('استشارة','consultations',`<strong>${c.title}</strong><div class="small">${c.user?.name||'-'}</div><div class="small">${c.message||''}</div><textarea id="consReply-${c.id}" class="full" placeholder="اكتب الرد على العميل">${c.aiReply||''}</textarea><div class="menu" style="margin-top:10px"><button class="btn" onclick="saveConsultation('${c.id}')">إرسال الرد للعميل</button></div>`)).join('');if((t==='all'||t==='users')) html+=adminState.users.filter(u=>!q||matches(`${u.name||''} ${u.email||''} ${u.role||''}`,q)).map(u=>rowHtml('مستخدم','users',`<strong>${u.name||'-'}</strong><div class="small">${u.email||'-'}</div><div class="small">الدور الحالي: ${u.role}</div>${adminState.me?.role==='owner'?`<div class="menu" style="margin-top:12px"><button class="btn secondary" onclick="setRole('${u.id}','client')">client</button><button class="btn secondary" onclick="setRole('${u.id}','helper')">helper</button><button class="btn secondary" onclick="setRole('${u.id}','admin')">admin</button></div>`:''}`)).join('');document.getElementById('adminResults').innerHTML=html||'<div class="item">لا توجد نتائج مطابقة.</div>'}
async function refreshAdmin(){const me=await OH.ensureAuth('/login.html');if(!me)return;if(!['owner','admin','helper'].includes(me.role)){OH.toast('هذه الصفحة للإدارة فقط', 'warn');location.href='/dashboard.html';return;}adminState.me=me;const mask=document.getElementById('loadingMask');mask.classList.add('show');try{const [stats,pays,users,subs,cons,prices]=await Promise.all([OH.api('/api/staff/stats'),OH.api('/api/payments/all'),OH.api('/api/staff/users'),OH.api('/api/submissions/all'),OH.api('/api/consultations/all'),OH.api('/api/payments/prices')]);adminState.payments=pays.payments||[];adminState.users=users.users||[];adminState.submissions=subs.submissions||[];adminState.consultations=cons.consultations||[];const s=stats.stats||{};document.getElementById('kpis').innerHTML=`<div class="card kpi"><div class="small">المستخدمون</div><strong>${s.users||0}</strong></div><div class="card kpi"><div class="small">الدفعات</div><strong>${s.payments||0}</strong></div><div class="card kpi"><div class="small">الطلبات</div><strong>${s.submissions||0}</strong></div><div class="card kpi"><div class="small">الاستشارات</div><strong>${s.consultations||0}</strong></div>`;document.getElementById('priceP').value=prices.P;document.getElementById('priceM').value=prices.M;document.getElementById('priceD').value=prices.D;document.getElementById('priceMonthly').value=prices.MONTHLY;renderResults();}catch(err){OH.toast(err.message||'تعذر تحميل لوحة الإدارة', 'error');}finally{mask.classList.remove('show')}}
async function approvePayment(id){await OH.api(`/api/payments/${id}/approve`,{method:'POST'});OH.toast('تم اعتماد الدفعة', 'ok');refreshAdmin();}
async function rejectPayment(id){await OH.api(`/api/payments/${id}/reject`,{method:'POST'});OH.toast('تم رفض الدفعة', 'warn');refreshAdmin();}
async function setRole(userId,role){await OH.api('/api/staff/role',{method:'POST',body:JSON.stringify({userId,role})});OH.toast('تم تحديث دور المستخدم', 'ok');refreshAdmin();}
async function saveSubmission(id){const reply=document.getElementById(`subReply-${id}`).value;const status=document.getElementById(`subStatus-${id}`).value;await OH.api(`/api/submissions/${id}/reply`,{method:'POST',body:JSON.stringify({reply,status})});OH.toast('تم إرسال الرد وتحديث الحالة', 'ok');refreshAdmin();}
async function saveConsultation(id){const reply=document.getElementById(`consReply-${id}`).value;await OH.api(`/api/consultations/${id}/reply`,{method:'POST',body:JSON.stringify({reply})});OH.toast('تم إرسال الرد للعميل', 'ok');refreshAdmin();}
document.getElementById('searchBox').addEventListener('input',renderResults);document.getElementById('filterType').addEventListener('change',renderResults);document.getElementById('savePricesBtn').addEventListener('click',async()=>{await OH.api('/api/payments/prices/save',{method:'POST',body:JSON.stringify({P:Number(priceP.value),M:Number(priceM.value),D:Number(priceD.value),MONTHLY:Number(priceMonthly.value)})});OH.toast('تم حفظ الأسعار', 'ok');refreshAdmin();});window.approvePayment=approvePayment;window.rejectPayment=rejectPayment;window.setRole=setRole;window.saveSubmission=saveSubmission;window.saveConsultation=saveConsultation;refreshAdmin();
</script></body></html>
