<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الاستشارات | OH</title><link rel="stylesheet" href="/styles.css"></head><body><div class="nav"><div class="brand brand-glow"><img src="/logo.svg" alt="OH"><span>OH</span></div><div class="menu"><a class="btn secondary" href="/">الرئيسية</a><a class="btn secondary" href="/dashboard.html">حسابي</a><button class="btn secondary" id="logoutBtn">خروج</button></div></div><div class="container"><div class="grid grid-2"><div class="card"><h2 class="section-title">طلب استشارة</h2><form id="consForm" class="list"><input class="input full" name="title" placeholder="عنوان الاستشارة"><textarea class="full" name="message" placeholder="اكتب السؤال أو المشكلة بالتفصيل"></textarea><button class="btn full" id="consBtn">إرسال الاستشارة</button></form><div class="small" style="margin-top:14px">إذا لم تعرف استخدام الموقع، اكتب هنا أو تواصل معنا مباشرة على واتساب أو إنستقرام.</div></div><div class="card"><h2 class="section-title">استشاراتي</h2><div id="consList" class="list"></div></div></div></div><div class="overlay-loading" id="loadingMask"><div class="loader-card"><div class="menu"><span class="spinner lg"></span><div>جارٍ إرسال الاستشارة...</div></div></div></div><div class="footer">OH التعليمية</div><script src="/app.js"></script><script>
OH.bindLogout();
async function refreshCons(){const data=await OH.api('/api/consultations/mine');const list=data.consultations||[];document.getElementById('consList').innerHTML=list.map(c=>`<div class="item"><strong>${c.title}</strong><div class="small">${(c.aiReply||'تم استلام الاستشارة وسيتم الرد قريبًا.').replaceAll('\n','<br>')}</div></div>`).join('')||'<div class="item">لا يوجد استشارات بعد.</div>'}
(async()=>{const me=await OH.ensureAuth('/login.html');if(!me)return;await refreshCons();})();
document.getElementById('consForm').onsubmit=async(e)=>{e.preventDefault();const btn=document.getElementById('consBtn');const mask=document.getElementById('loadingMask');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>&nbsp; جارٍ إرسال الاستشارة...';mask.classList.add('show');try{const body=Object.fromEntries(new FormData(e.target).entries());await OH.api('/api/consultations/create',{method:'POST',body:JSON.stringify(body)});e.target.reset();await refreshCons();OH.toast('تم إرسال الاستشارة بنجاح', 'ok');}catch(err){OH.toast(err.message||'تعذر إرسال الاستشارة.', 'error');}finally{btn.disabled=false;btn.textContent='إرسال الاستشارة';mask.classList.remove('show');}};
</script></body></html>
