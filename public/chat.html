<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الشات | OH</title><link rel="stylesheet" href="/styles.css"></head><body><div class="nav"><div class="brand brand-glow">OH</div><div class="menu"><a class="btn secondary" href="/">الرئيسية</a><a class="btn secondary" href="/dashboard.html">حسابي</a><button class="btn secondary" id="logoutBtn">خروج</button></div></div><div class="container"><div class="chat-wrap"><div class="card"><div class="toolbar"><h2 class="section-title">المحادثات</h2><button class="btn secondary" id="newChatBtn">محادثة جديدة</button></div><div id="sessions" class="list chat-list"></div></div><div class="card"><h2 class="section-title" id="chatTitle">الشات</h2><div id="messages" class="messages"></div><form id="msgForm" class="list"><textarea name="content" class="full" placeholder="اكتب سؤالك هنا"></textarea><button class="btn full" id="sendMsgBtn">إرسال</button></form></div></div></div><div class="footer">OH التعليمية</div><script src="/app.js"></script><script>
OH.bindLogout();
let currentSessionId = null;
function renderMessages(messages=[]){document.getElementById('messages').innerHTML=messages.map(m=>`<div class="msg ${m.role==='user'?'user':''}"><strong>${m.role==='user'?'أنت':'المساعد'}</strong><div class="small">${(m.content||'').replaceAll('\n','<br>')}</div></div>`).join('')||'<div class="item">ابدأ محادثة جديدة.</div>'}
async function refreshSessions(){const data=await OH.api('/api/chat/sessions');const list=data.sessions||[];document.getElementById('sessions').innerHTML=list.map(s=>`<button class="btn secondary full" onclick="openSession('${s.id}')">${s.title||'محادثة جديدة'}</button>`).join('')||'<div class="item">لا يوجد محادثات.</div>'}
async function openSession(id){currentSessionId=id;const data=await OH.api(`/api/chat/sessions/${id}`);document.getElementById('chatTitle').textContent=data.session.title||'الشات';renderMessages(data.session.messages||[])}
(async()=>{const me=await OH.ensureAuth('/login.html');if(!me)return;await refreshSessions();})();
document.getElementById('newChatBtn').onclick=async()=>{const res=await OH.api('/api/chat/sessions',{method:'POST',body:JSON.stringify({title:'محادثة جديدة'})});await refreshSessions();await openSession(res.session.id)};
document.getElementById('msgForm').onsubmit=async(e)=>{e.preventDefault();if(!currentSessionId){alert('أنشئ محادثة جديدة أولًا.');return;}const form=new FormData(e.target);const content=form.get('content');if(!content)return;const btn=document.getElementById('sendMsgBtn');btn.disabled=true;btn.textContent='جارٍ الرد...';try{await OH.api(`/api/chat/sessions/${currentSessionId}/message`,{method:'POST',body:JSON.stringify({content})});e.target.reset();await openSession(currentSessionId);}catch(err){alert(err.message||'تعذر إرسال الرسالة.');}finally{btn.disabled=false;btn.textContent='إرسال';}};
window.openSession=openSession;
</script></body></html>
