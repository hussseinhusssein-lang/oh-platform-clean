<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تواصل معنا | OH WORK</title>

<link rel="stylesheet" href="/styles.css">

<style>
:root{
  --bg:#050816;
  --line:rgba(255,255,255,.09);
  --text:#fff;
  --muted:rgba(255,255,255,.65);
  --violet:#8b5cf6;
  --cyan:#22d3ee;
}

body{
  margin:0;
  font-family:"Segoe UI";
  background:linear-gradient(180deg,#050816,#070b1a);
  color:var(--text);
}

/* NAV */
.nav{
  margin:18px auto;
  width:90%;
  display:flex;
  justify-content:space-between;
  padding:12px;
  border:1px solid var(--line);
  border-radius:20px;
}

.menu a{
  padding:10px 16px;
  border:1px solid var(--line);
  border-radius:12px;
  margin:5px;
  text-decoration:none;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:50px;
  font-weight:900;
}
.hero span{
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  width:90%;
  margin:auto;
}

.card{
  border:1px solid var(--line);
  padding:25px;
  border-radius:20px;
  background:#0b1024;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#050816;
  color:white;
}

textarea{
  min-height:150px;
}

/* BTN */
.btn{
  margin-top:15px;
  padding:14px;
  border:none;
  width:100%;
  border-radius:14px;
  background:linear-gradient(90deg,var(--violet),var(--cyan));
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* LINKS */
.links a{
  display:block;
  padding:14px;
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:12px;
  text-decoration:none;
  color:white;
}

.footer{
  text-align:center;
  margin-top:40px;
  color:#777;
}
</style>
</head>

<body>

<div class="nav">
  <div>OH WORK</div>
  <div class="menu">
    <a href="/">الرئيسية</a>
    <a href="/dashboard.html">حسابي</a>
    <a href="/submit.html">إرسال الملف</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>تواصل معنا <span>بسهولة</span></h1>
  <p>إذا واجهت أي مشكلة أو بدك مساعدة، تواصل معنا مباشرة</p>
</div>

<!-- CONTENT -->
<div class="grid">

  <!-- FORM -->
  <div class="card">
    <h2>أرسل رسالة</h2>

    <input placeholder="اسمك">
    <input placeholder="بريدك الإلكتروني">
    <textarea placeholder="اكتب رسالتك هنا..."></textarea>

    <button class="btn">إرسال</button>
  </div>

  <!-- CONTACT -->
  <div class="card">
    <h2>تواصل مباشر</h2>

    <div class="links">
      <a href="https://wa.me/962775248389" target="_blank">📱 واتساب</a>
      <a href="https://instagram.com/oh.work4" target="_blank">📸 إنستقرام</a>
      <a href="mailto:support@oh-work.com">📧 إيميل</a>
    </div>

    <p style="margin-top:20px;color:#aaa;">
      متاحين يوميًا للرد على جميع الاستفسارات 💬
    </p>
  </div>

</div>

<div class="footer">
OH WORK © 2026
</div>

</body>
</html>
